<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño de la Aplicación - LiFe System</title>
    <!-- Incluimos Devicon para cargar los logos de las tecnologías automáticamente -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        
        .diagram-container {
            width: 100%;
            max-width: 900px;
        }
        
        h1 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        
        p.subtitle {
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .architecture {
            display: flex;
            align-items: stretch;
            justify-content: space-between;
        }

        .box {
            border: 1px solid #000;
            position: relative;
            padding: 40px 20px 20px 20px;
            background-color: #fff;
        }

        .box-title {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 1.2rem;
            background-color: #fff;
            padding: 0 5px;
        }

        /* Server Box */
        .server-box {
            flex: 2.5;
            display: flex;
            flex-direction: column;
        }

        .server-top-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 40px;
        }

        .server-bottom-row {
            display: flex;
            justify-content: flex-start;
            padding-left: 20px;
            position: relative;
        }

        /* Inner Components */
        .component {
            border: 1px solid #888;
            padding: 10px 15px 20px 15px;
            min-width: 160px;
            background-color: #fff;
        }

        .component-title {
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .icons-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 3.5rem;
        }

        /* Client Box */
        .client-box {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .client-icon {
            font-size: 4.5rem;
        }

        /* Arrows Container */
        .main-arrow-container {
            display: flex;
            align-items: center;
            width: 80px;
        }

        /* Custom Double-headed Arrow Line */
        .arrow-horizontal {
            width: 100%;
            height: 1px;
            background-color: #000;
            position: relative;
        }

        .arrow-horizontal::before {
            content: '';
            position: absolute;
            left: 0;
            top: -4px;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-right: 8px solid #000;
        }

        .arrow-horizontal::after {
            content: '';
            position: absolute;
            right: 0;
            top: -4px;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-left: 8px solid #000;
        }

        /* Arrow between Backend and DB */
        .arrow-vertical-container {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            height: 40px;
            width: 10px;
        }

        .arrow-vertical {
            height: 100%;
            width: 1px;
            background-color: #000;
            margin: 0 auto;
            position: relative;
        }

        .arrow-vertical::before {
            content: '';
            position: absolute;
            top: 0;
            left: -4px;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 8px solid #000;
        }

        .arrow-vertical::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -4px;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 8px solid #000;
        }
        
        .arrow-inner-horizontal {
            width: 40px;
            height: 1px;
            background-color: #000;
            position: relative;
        }
        
        .arrow-inner-horizontal::before {
            content: '';
            position: absolute;
            left: 0;
            top: -4px;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-right: 8px solid #000;
        }

        .arrow-inner-horizontal::after {
            content: '';
            position: absolute;
            right: 0;
            top: -4px;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-left: 8px solid #000;
        }

    </style>
</head>
<body>

<div class="diagram-container">
    <h1>5.3.3 Diseño de la Aplicación.</h1>
    <p class="subtitle">La aplicación tiene el siguiente diseño a la hora de comunicarse entre servidor y cliente.</p>

    <div class="architecture">
        
        <!-- Contenedor Servidor -->
        <div class="box server-box">
            <div class="box-title">Servidor</div>
            
            <div class="server-top-row">
                <!-- BackEnd Component -->
                <div class="component">
                    <div class="component-title">BackEnd</div>
                    <div class="icons-row">
                        <i class="devicon-spring-original colored"></i>
                        <i class="devicon-java-plain colored"></i>
                    </div>
                </div>

                <!-- Flecha Front-Back -->
                <div style="display: flex; align-items: center;">
                    <div class="arrow-inner-horizontal"></div>
                </div>

                <!-- FrontEnd Component -->
                <div class="component">
                    <div class="component-title">FrontEnd</div>
                    <div class="icons-row">
                        <i class="devicon-angularjs-plain colored"></i>
                    </div>
                </div>
            </div>

            <div class="server-bottom-row">
                <!-- Base de Datos Component -->
                <div class="component">
                    <!-- Contenedor de la flecha vertical que une BD con Backend -->
                    <div class="arrow-vertical-container">
                        <div class="arrow-vertical"></div>
                    </div>

                    <div class="component-title">Base de Datos</div>
                    <div class="icons-row" style="margin-top: 10px;">
                        <i class="devicon-postgresql-plain colored"></i>
                    </div>
                </div>
            </div>
            
        </div>

        <!-- Flecha Principal Servidor - Cliente -->
        <div class="main-arrow-container">
            <div class="arrow-horizontal"></div>
        </div>

        <!-- Contenedor Cliente -->
        <div class="box client-box">
            <div class="box-title">Cliente</div>
            
            <i class="devicon-firefox-plain colored client-icon"></i>
            <i class="devicon-chrome-plain colored client-icon"></i>
            <i class="devicon-safari-plain colored client-icon"></i>
            
        </div>
        
    </div>
</div>

</body>
</html>
