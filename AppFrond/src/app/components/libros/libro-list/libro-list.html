<div class="flex flex-col w-[95%] xl:w-[85%] mx-auto mt-4">
  <div class="glass shadow-2xl border border-white/50 rounded-[7px] overflow-hidden flex flex-col hover-blue-border">
    <!-- Header Decorativo Estilo SO -->
    <div class="h-10 flex items-center px-4 bg-slate-900/90 border-b border-white/20">
      <div class="flex gap-2">
        <div class="w-3 h-3 rounded-full bg-red-500 hover:opacity-80 cursor-pointer"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500 hover:opacity-80 cursor-pointer"></div>
        <div class="w-3 h-3 rounded-full bg-green-500 hover:opacity-80 cursor-pointer"></div>
      </div>
      <div class="flex-1 text-center text-white text-sm font-semibold mr-10 drop-shadow-md">Gestión de Libros</div>
    </div>

    <!-- Menú de Búsqueda -->
    <div class="p-6 border-b border-white/10 bg-black/20">
      <form (ngSubmit)="buscar()" class="flex flex-col md:flex-row gap-4 items-end">
        <div class="flex-1 w-full">
          <label class="block text-slate-200 text-xs font-bold mb-2 uppercase tracking-wide">Título</label>
          <input type="text" name="titulo" [(ngModel)]="filtros.titulo" placeholder="Buscar por título..."
                 class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm">
        </div>
        
        <div class="flex-1 w-full">
          <label class="block text-slate-200 text-xs font-bold mb-2 uppercase tracking-wide">Autor</label>
          <input type="text" name="autor" [(ngModel)]="filtros.autor" placeholder="Buscar por autor..."
                 class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm">
        </div>
        
        <div class="flex-1 w-full">
          <label class="block text-slate-200 text-xs font-bold mb-2 uppercase tracking-wide">Género</label>
          <input type="text" name="genero" [(ngModel)]="filtros.genero" placeholder="Buscar por género..."
                 class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm">
        </div>
        
        <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0">
          <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg transition-colors text-sm flex-1 md:flex-none">
            Buscar
          </button>
          <button type="button" (click)="limpiar()" class="bg-white/10 hover:bg-white/20 text-white font-bold py-2 px-4 rounded-lg transition-colors border border-white/20 text-sm flex-1 md:flex-none">
            Limpiar
          </button>
          <button type="button" (click)="irCrearLibro()" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded-lg transition-colors text-sm flex-1 md:flex-none whitespace-nowrap shadow-lg shadow-green-500/30">
            + Nuevo Libro
          </button>
        </div>
      </form>
    </div>

    <!-- Tabla de Libros -->
    <div class="overflow-x-auto overflow-y-auto max-h-[375px] custom-scrollbar">
      <table class="w-full text-left border-collapse relative">
        <thead class="bg-slate-900/95 backdrop-blur-md border-b border-white/20 sticky top-0 z-10 shadow-sm">
          <tr>
            <th class="px-4 py-2.5 text-white text-[10px] sm:text-xs font-bold uppercase tracking-wider backdrop-blur-md">ID</th>
            <th class="px-4 py-2.5 text-white text-[10px] sm:text-xs font-bold uppercase tracking-wider backdrop-blur-md">Título</th>
            <th class="px-4 py-2.5 text-white text-[10px] sm:text-xs font-bold uppercase tracking-wider backdrop-blur-md">Autor</th>
            <th class="px-4 py-2.5 text-white text-[10px] sm:text-xs font-bold uppercase tracking-wider backdrop-blur-md">Género</th>
            <th class="px-4 py-2.5 text-white text-[10px] sm:text-xs font-bold uppercase tracking-wider text-center backdrop-blur-md">Estado</th>
            <th class="px-4 py-2.5 text-white text-[10px] sm:text-xs font-bold uppercase tracking-wider text-center backdrop-blur-md">Acciones</th>
          </tr>
        </thead>
        <tbody class="text-slate-200 text-sm font-medium">
          <tr *ngFor="let item of ejemplares" class="border-b border-white/10 hover:bg-white/10 transition-colors cursor-default">
            <td class="px-4 py-2 whitespace-nowrap text-white/50 text-xs">{{ item.id }}</td>
            <td class="px-4 py-2 text-white font-bold text-xs truncate max-w-[200px]">{{ item.libro.titulo }}</td>
            <td class="px-4 py-2 text-white/80 text-xs truncate max-w-[150px]">{{ item.libro.autor }}</td>
            <td class="px-4 py-2 text-white/80">
              <span class="bg-white/5 border border-white/10 px-2 py-0.5 rounded text-[10px] uppercase">{{ item.libro.genero }}</span>
            </td>
            <td class="px-4 py-2 text-center text-xs">
              <span [ngClass]="{
                  'bg-green-500/20 text-green-300 border border-green-500/40': item.estado.descripcion.toLowerCase() === 'disponible',
                  'bg-yellow-500/20 text-yellow-300 border border-yellow-500/40': item.estado.descripcion.toLowerCase() === 'prestado',
                  'bg-red-500/20 text-red-300 border border-red-500/40': item.estado.descripcion.toLowerCase() !== 'disponible' && item.estado.descripcion.toLowerCase() !== 'prestado'
                }"
                class="px-2 py-0.5 inline-flex leading-4 font-bold rounded shadow-sm text-[10px] uppercase tracking-wide">
                {{ item.estado.descripcion }}
              </span>
            </td>
            <td class="px-4 py-2 text-center">
              <button class="bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-1 px-3 rounded-none text-[10px] transition-colors shadow-sm">
                Editar
              </button>
            </td>
          </tr>
          <tr *ngIf="ejemplares.length === 0">
            <td colspan="6" class="px-5 py-12 text-center text-white/50 italic text-sm">
              <div class="flex flex-col items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                No se encontraron ejemplares con los filtros aplicados.
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    
  </div>
</div>
