<div class="login-container">
  <div class="login-card">
    <h1>LibraryPro</h1>
    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="usuario.email" required placeholder="ejemplo@correo.com">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="usuario.password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.875rem;">
      ¿No tienes cuenta? Contacta con el Administrador.
    </p>
  </div>
</div>
