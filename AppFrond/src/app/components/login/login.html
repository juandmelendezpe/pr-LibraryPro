<!-- Main Background Wrapper -->
<div class="relative min-h-screen w-full flex items-center justify-center overflow-hidden bg-cover bg-center" data-alt="Cozy modern library with tall bookshelves and warm lighting" style="background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCViUbKqqmEu9Ud8YEvf0kBO_AAEMzUB8WsdfuICjE3klPuuUCJdWseqky6ilkWjweqTpnl0b4OHNydu-xJUfmjutU0OZ3ppZ7pK3utM4iSqATJHe5Kx0dxqltvNDDFLvStV17dy3vKD48oKk1It5uqDcjRCS7Z557U1yxAATitPRbIZKZ5Pg0B0YYjeOgxBXe-KzTRSQTvFUvNQFlaHxiiwYEVSypSU3IKbFy3OihpxI41FtMssLmNdGSJFbNm7nOfqOzg_fIyoWI&quot;);">
  <!-- Overlay for better contrast -->
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px]"></div>
  <!-- Glassmorphism Login Card -->
  <div class="relative z-10 w-full max-w-[440px] px-6">
    <div class="bg-white/10 dark:bg-slate-900/60 backdrop-blur-xl border border-white/20 dark:border-slate-700/50 rounded-xl shadow-2xl p-8 md:p-10">
      <!-- Logo & Header -->
      <div class="flex flex-col items-center mb-2">
        <div class="w-18 h-18 rounded-full flex items-center justify-center mb-4 shadow-lg shadow-primary/20 bg-white/5">
          <img src="logo.png" alt="Logo" class="w-16 h-16 rounded-full object-cover drop-shadow-md">
        </div>
        <h1 class="text-3xl font-bold text-slate-100 tracking-tight">Life System</h1>
        <p class="text-slate-400 mt-2 text-center text-sm">Library For Every One</p>
      </div>
      
      <!-- Error Message Box -->
      <div *ngIf="errorMessage" class="mb-6 p-4 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center gap-3">
        <span class="material-symbols-outlined text-red-500">error</span>
        <p class="text-red-200 text-sm flex-1">{{ errorMessage }}</p>
      </div>

      <!-- Login Form -->
      <form class="space-y-5" (ngSubmit)="onLogin()">
        <!-- Email Field -->
        <div class="flex flex-col gap-2">
          <label for="email" class="text-slate-200 text-sm font-medium ml-1">Correo Electrónico</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
            <input id="email" name="email" [(ngModel)]="usuario.email" required 
                   class="w-full bg-white/5 dark:bg-slate-800/40 border border-white/10 dark:border-slate-700 rounded-lg py-3.5 pl-12 pr-4 text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" 
                   placeholder="name@example.com" type="email">
          </div>
        </div>
        <!-- Password Field -->
        <div class="flex flex-col gap-2">
          <label for="password" class="text-slate-200 text-sm font-medium ml-1">Contraseña</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
            <input id="password" name="password" [(ngModel)]="usuario.password" required 
                   class="w-full bg-white/5 dark:bg-slate-800/40 border border-white/10 dark:border-slate-700 rounded-lg py-3.5 pl-12 pr-12 text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" 
                   placeholder="••••••••" type="password">
            <button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white" type="button">
              <span class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </div>
        </div>
        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between py-1">
          <label class="flex items-center gap-2 cursor-pointer group">
            <div class="relative flex items-center">
              <input class="peer appearance-none size-5 border-2 border-slate-500 rounded bg-transparent checked:bg-primary checked:border-primary transition-all" type="checkbox">
              <span class="material-symbols-outlined absolute text-white text-sm scale-0 peer-checked:scale-100 left-[3px] pointer-events-none transition-transform">check</span>
            </div>
            <span class="text-slate-300 text-sm group-hover:text-white transition-colors">Recordarme</span>
          </label>
          <a class="text-primary hover:text-primary/80 text-sm font-medium transition-colors" href="#">¿Olvidaste tu contraseña?</a>
        </div>
        <!-- Login Button -->
        <button type="submit" [disabled]="loading" class="w-full bg-primary hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-2 flex justify-center items-center gap-2">
            <ng-container *ngIf="loading">
              <span class="material-symbols-outlined animate-spin shadow-primary/20 shadow-none text-white opacity-100 dark:bg-transparent">progress_activity</span>
            </ng-container>
            <span *ngIf="!loading">Entrar</span>
        </button>
      </form>
      <!-- Footer Links -->
      <div class="mt-8 text-center border-t border-white/10 pt-6">
        <p class="text-slate-400 text-sm">Bienvenidos a Life System</p>
      </div>
    </div>
    <!-- Small Bottom Links -->
    <div class="mt-8 flex justify-center gap-6 text-xs text-slate-400 font-medium">
      <a class="hover:text-white transition-colors uppercase tracking-widest" href="#">Privacy Policy</a>
      <a class="hover:text-white transition-colors uppercase tracking-widest" href="#">Terms of Service</a>
      <a class="hover:text-white transition-colors uppercase tracking-widest" href="#">Support</a>
    </div>
  </div>
</div>
