<!-- OVERLAY MODAL -->
<div *ngIf="isOpen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300">
  
  <!-- MODAL CONTAINER (Glassmorphism) -->
  <div class="glass w-[90%] md:w-[60%] lg:w-[45%] rounded-xl shadow-2xl border-white/40 flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
    
    <!-- HEADER -->
    <div class="h-12 flex items-center px-4 bg-slate-900/60 border-b border-white/20 justify-between">
      <div class="text-white text-sm font-bold uppercase tracking-wide">
        {{ isNew ? 'Crear Nuevo ' + editableUser.rol.titulo : 'Editar Usuario' }}
      </div>
      <button (click)="cerrar()" class="text-white/50 hover:text-white transition-colors">
        <span class="material-symbols-outlined font-bold text-xl">close</span>
      </button>
    </div>
    
    <!-- BODY (Formulario) -->
    <div class="p-6 overflow-y-auto max-h-[70vh] custom-scrollbar">
      <form (ngSubmit)="guardar()" #userForm="ngForm">
      
        <!-- Datos Personales -->
        <h3 class="text-slate-300 text-xs font-semibold uppercase tracking-wider mb-3 pb-1 border-b border-white/10">Datos Personales</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-slate-200 text-[10px] font-bold mb-1 uppercase tracking-wide">Nombre Completo <span class="text-red-400">*</span></label>
            <input type="text" name="nombre" [(ngModel)]="editableUser.nombre" required placeholder="Ej. Juan Pérez"
                   class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm">
          </div>
          <div>
            <label class="block text-slate-200 text-[10px] font-bold mb-1 uppercase tracking-wide">Correo Electrónico <span class="text-red-400">*</span></label>
            <input type="email" name="email" [(ngModel)]="editableUser.email" required placeholder="Ej. juan@mail.com"
                   class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-slate-200 text-[10px] font-bold mb-1 uppercase tracking-wide">Teléfono</label>
            <input type="text" name="telefono" [(ngModel)]="editableUser.telefono" placeholder="Opcional"
                   class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm">
          </div>
          <div>
            <label class="block text-slate-200 text-[10px] font-bold mb-1 uppercase tracking-wide">Dirección</label>
            <input type="text" name="direccion" [(ngModel)]="editableUser.direccion" placeholder="Opcional"
                   class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm">
          </div>
        </div>

        <!-- Acceso y Sistema -->
        <h3 class="text-slate-300 text-xs font-semibold uppercase tracking-wider mb-3 pb-1 border-b border-white/10">Acceso y Sistema</h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
          <div *ngIf="isNew">
            <label class="block text-slate-200 text-[10px] font-bold mb-1 uppercase tracking-wide">Contraseña <span class="text-red-400">*</span></label>
            <input type="password" name="contrasena" [(ngModel)]="editableUser.contrasena" required placeholder="Asignar contraseña"
                   class="w-full bg-white/10 border border-white/20 text-white placeholder-white/50 px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm">
          </div>
          <div>
            <label class="block text-slate-200 text-[10px] font-bold mb-1 uppercase tracking-wide">Rol del Sistema</label>
            <div class="relative">
              <select name="rolSelect" [ngModel]="editableUser.rol.titulo" (change)="onRoleChange($event)"
                      class="w-full bg-white/10 border border-white/20 text-white appearance-none px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 focus:bg-white/20 transition-all text-sm [&>option]:bg-slate-800">
                <option value="Lector">Lector</option>
                <option value="Admin">Administrador</option>
                <option value="SuperAdmin">Súper Administrador</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-white/50">
                <span class="material-symbols-outlined text-sm">expand_more</span>
              </div>
            </div>
          </div>
          <div class="flex items-end pb-1">
             <label class="flex items-center gap-2 cursor-pointer select-none">
               <input type="checkbox" name="activo" [(ngModel)]="editableUser.activo" class="hidden peer">
               <div class="w-10 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500 relative transition-colors shadow-inner"></div>
               <span class="text-white text-xs font-semibold uppercase tracking-wider">Perfil Activo</span>
             </label>
          </div>
        </div>

        <!-- FOOTER (Actions) -->
        <div class="flex justify-end gap-3 pt-3 mt-4 border-t border-white/10">
          <button type="button" (click)="cerrar()" class="bg-white/5 hover:bg-white/10 text-white border border-white/20 font-bold py-2 px-6 rounded-lg transition-colors text-sm shadow-sm backdrop-blur">
            Cancelar
          </button>
          <button type="submit" [disabled]="!userForm.form.valid" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-8 rounded-lg transition-colors text-sm shadow-md shadow-blue-500/30 disabled:opacity-50 disabled:cursor-not-allowed">
            {{ isNew ? 'Crear' : 'Guardar Cambios' }}
          </button>
        </div>
        
      </form>
    </div>
  </div>
</div>
