<header>
  <h2>Registrar Donación</h2>
</header>

<div class="card" style="max-width: 600px;">
  <form (ngSubmit)="registrarDonacion()">
    <div class="card" style="margin-bottom: 1.5rem; background: #f8fafc; border: 1px dashed var(--secondary);">
      <h4>Información del Libro Donado</h4>
      <div class="form-group">
        <label>Título</label>
        <input type="text" name="titulo" [(ngModel)]="donacion.libro.titulo" required placeholder="Título del libro">
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label>Autor</label>
          <input type="text" name="autor" [(ngModel)]="donacion.libro.autor" required>
        </div>
        <div class="form-group">
          <label>Género</label>
          <input type="text" name="genero" [(ngModel)]="donacion.libro.genero">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Email del Donante</label>
      <div style="display: flex; gap: 0.5rem;">
        <input type="email" name="email" [(ngModel)]="donacion.donante.email" required placeholder="correo@ejemplo.com" style="flex: 1;">
        <button type="button" class="btn" (click)="toggleUsuarioNuevo()" [style.background]="usuarioNuevo ? 'var(--secondary)' : '#e2e8f0'">
          {{ usuarioNuevo ? '✓ Perfil Nuevo' : '+ Perfil Nuevo' }}
        </button>
      </div>
    </div>

    <div *ngIf="usuarioNuevo" class="card" style="margin: 1rem 0; background: #f1f5f9; padding: 1rem;">
      <h4>Datos del Nuevo Perfil del Donante</h4>
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" name="nombre" [(ngModel)]="donacion.donante.nombre">
      </div>
    </div>

    <div class="form-group">
      <label>Fecha de Donación</label>
      <input type="date" name="fecha" [(ngModel)]="donacion.fecha" required>
    </div>

    <div class="form-group">
      <label>Observaciones</label>
      <textarea name="observaciones" [(ngModel)]="donacion.observaciones" style="width: 100%; min-height: 100px; border-radius: 0.5rem; border: 1px solid var(--border); padding: 0.5rem;"></textarea>
    </div>

    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
      <button type="submit" class="btn btn-primary" style="flex: 1; background: var(--secondary);">Registrar Donación</button>
      <button type="button" class="btn" style="background: #e2e8f0;">Cancelar</button>
    </div>
  </form>
</div>
