<!-- Login Wrapper -->
<div *ngIf="router.url === '/login'" class="w-full min-h-screen">
  <router-outlet></router-outlet>
</div>

<!-- Main App Wrapper (OS Layout) -->
<div *ngIf="router.url !== '/login'" class="relative h-screen w-full flex flex-col desktop-bg overflow-hidden"
  data-alt="Deep blue abstract gradient desktop wallpaper">
  <!-- Top Menu Bar (OS Style) -->
  <header class="flex items-center justify-between px-6 h-10 bg-[#061a40]/90 backdrop-blur-md border-b border-white/10 w-full z-50 text-slate-100 text-sm font-medium shadow-sm">
    <div class="flex items-center gap-8">
      <!-- Logo App -->
      <div class="flex items-center gap-2 group cursor-pointer" routerLink="/home">
        <span class="material-symbols-outlined text-lg text-primary group-hover:rotate-180 transition-transform duration-500">settings_input_component</span>
        <span class="font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-white">LibraryPro</span>
      </div>
      <!-- Enlaces Navegación -->
      <div class="hidden md:flex gap-1">
        <a routerLink="/home" routerLinkActive="bg-white/20 text-white shadow-inner" [routerLinkActiveOptions]="{exact: true}" class="cursor-pointer px-3 py-1 rounded-md text-slate-300 hover:text-white hover:bg-white/10 hover:shadow-sm transition-all duration-200 hover:-translate-y-[1px] active:translate-y-0 active:scale-95 flex items-center gap-1 text-[13px]">
          Inicio
        </a>
        <a routerLink="/prestamos" routerLinkActive="bg-white/20 text-white shadow-inner" class="cursor-pointer px-3 py-1 rounded-md text-slate-300 hover:text-white hover:bg-white/10 hover:shadow-sm transition-all duration-200 hover:-translate-y-[1px] active:translate-y-0 active:scale-95 flex items-center gap-1 text-[13px]">
          Préstamos
        </a>
        <a routerLink="/donaciones" routerLinkActive="bg-white/20 text-white shadow-inner" class="cursor-pointer px-3 py-1 rounded-md text-slate-300 hover:text-white hover:bg-white/10 hover:shadow-sm transition-all duration-200 hover:-translate-y-[1px] active:translate-y-0 active:scale-95 flex items-center gap-1 text-[13px]">
          Donaciones
        </a>
        <a routerLink="/libros" routerLinkActive="bg-white/20 text-white shadow-inner" class="cursor-pointer px-3 py-1 rounded-md text-slate-300 hover:text-white hover:bg-white/10 hover:shadow-sm transition-all duration-200 hover:-translate-y-[1px] active:translate-y-0 active:scale-95 flex items-center gap-1 text-[13px]">
          Libros
        </a>        
        <a routerLink="/soporte" routerLinkActive="bg-white/20 text-white shadow-inner" class="cursor-pointer px-3 py-1 rounded-md text-slate-400 hover:text-white hover:bg-white/10 hover:shadow-sm transition-all duration-200 hover:-translate-y-[1px] active:translate-y-0 active:scale-95 flex items-center gap-1 text-[13px]">
          Soporte Técnico
        </a>
      </div>
    </div>
    <!-- Accesos Usuario y Reloj -->
    <div class="flex items-center gap-3">
      <div class="px-3 py-1 rounded-full bg-white/5 border border-white/10 flex items-center gap-2 transition-colors hover:bg-white/10 cursor-default shadow-inner">
        <span class="material-symbols-outlined text-[14px] text-blue-300">person</span>
        <span class="text-[12px] font-semibold">{{ loggedUserName || 'Usuario' }}</span>
      </div>
      <button (click)="logout()" class="px-3 py-1 rounded-md text-red-400 hover:text-red-200 hover:bg-red-500/20 transition-all duration-200 hover:-translate-y-[1px] active:translate-y-0 active:scale-95 flex items-center gap-1 text-[12px] font-bold border border-transparent hover:border-red-500/30">
         <span class="material-symbols-outlined text-[14px]">logout</span> Salir
      </button>
      <div class="w-px h-4 bg-white/20 mx-1"></div>
      <div class="flex items-center gap-2 group cursor-default">
        <span class="material-symbols-outlined text-[16px] text-slate-400 group-hover:text-white transition-colors">schedule</span>
        <span class="text-[12px] font-mono font-medium text-slate-300 group-hover:text-white transition-colors">{{ currentTime }}</span>
      </div>
    </div>
  </header>

  <!-- Desktop Area -->
  <main class="flex-1 w-full relative overflow-y-auto overflow-x-hidden no-scrollbar pb-16 flex flex-col">
    <!-- Router Outlet takes up space in the desktop as a window or straight elements -->
    <router-outlet></router-outlet>
  </main>

  <!-- OS Dock (Bottom Menu) -->
  <nav *ngIf="router.url !== '/reportes'"
    class="absolute bottom-3 left-1/2 -translate-x-1/2 bg-[#061a40]/80 backdrop-blur-md border border-white/50 rounded-2xl p-3 flex items-center gap-4 z-50 hover:scale-90 transition-transform active:scale-90">
    <div class="group relative flex flex-col items-center">
      <div
        class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg cursor-pointer hover:scale-110 transition-transform active:scale-95 border border-white/10"
        routerLink="/prestamos" routerLinkActive="!bg-primary/80">
        <span class="material-symbols-outlined text-3xl">handshake</span>
      </div>
      <span
        class="absolute -top-10 opacity-0 group-hover:opacity-100 bg-black/80 text-white text-[10px] px-2 py-1 rounded-md transition-opacity whitespace-nowrap">Préstamos</span>
      <!-- Indicator dot for active route can be added with CSS logic if needed -->
    </div>

    <div class="group relative flex flex-col items-center">
      <div
        class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-white shadow-lg cursor-pointer hover:scale-110 transition-transform active:scale-95 border border-white/10"
        routerLink="/donaciones" routerLinkActive="!bg-primary">
        <span class="material-symbols-outlined text-3xl">volunteer_activism</span>
      </div>
      <span
        class="absolute -top-10 opacity-0 group-hover:opacity-100 bg-black/80 text-white text-[10px] px-2 py-1 rounded-md transition-opacity whitespace-nowrap">Donaciones</span>
    </div>

    <div class="group relative flex flex-col items-center">
      <div
        class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-white shadow-lg cursor-pointer hover:scale-110 transition-transform active:scale-95 border border-white/10"
        routerLink="/libros" routerLinkActive="!bg-primary">
        <span class="material-symbols-outlined text-3xl">local_library</span>
      </div>
      <span class="absolute -top-10 opacity-0 group-hover:opacity-100 
      bg-black/80 text-white text-[10px] px-2 py-1 rounded-md transition-opacity
       whitespace-nowrap">Inv Libros</span>
    </div>

    <div class="w-px h-8 bg-white/20 mx-1"></div>

    <div class="group relative flex flex-col items-center">
      <div
        class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-white shadow-lg cursor-pointer hover:scale-110 transition-transform active:scale-95 border border-white/10"
        routerLink="/gestion-responsables" routerLinkActive="!bg-primary">
        <span class="material-symbols-outlined text-3xl">group</span>
      </div>
      <span
        class="absolute -top-10 opacity-0 group-hover:opacity-100 bg-black/80 text-white text-[10px] px-2 py-1 rounded-md transition-opacity whitespace-nowrap">Gestores</span>
    </div>

    <div class="group relative flex flex-col items-center">
      <div
        class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-white shadow-lg cursor-pointer 
        hover:scale-110 transition-transform active:scale-95 border border-white/10" routerLink="/reportes" routerLinkActive="!bg-primary">
        <span class="material-symbols-outlined text-3xl">insert_chart</span>
      </div>
      <span class="absolute -top-10 opacity-0 group-hover:opacity-100 bg-black/80 text-white text-[10px] px-2 py-1 rounded-md transition-opacity whitespace-nowrap">Reportes</span>
    </div>

  </nav>
</div>
